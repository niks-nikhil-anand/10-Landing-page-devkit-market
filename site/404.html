    <title>Page not found</title>

      span { color: #a78bfa; font-size: 13px; font-weight: 800; letter-spacing: .16em; }

      p { color: #a7acb8; font-size: 17px; line-height: 1.6; }
      a { display: inline-block; margin-top: 18px; padding: 13px 20px; border-radius: 999px; background: #7c3aed; color: white; font-weight: 700; text-decoration: none; }

  </head>
  <body><main><span>404</span><h1>Page not found.</h1><p>The landing page you requested does not exist.</p><a href="/">View all landing pages</a></main></body>
